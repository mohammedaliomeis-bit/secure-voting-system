<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      th:fragment="page(title, content, scripts)" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${title} + ' · Secure Voting System'">Secure Voting System</title>
    <link rel="icon" type="image/svg+xml"
          th:href="@{/images/favicon.svg}"
          href="/images/favicon.svg">
    <link rel="stylesheet" th:href="@{/css/tokens.css}" href="/css/tokens.css">
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
    <style>
        /* Chatbot widget styling - inlined to avoid any external dependency issues */
        .chatbot-toggle {
            position: fixed; bottom: 24px; right: 24px;
            width: 56px; height: 56px; border-radius: 50%;
            background: #4263eb; color: #fff; border: none;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
            font-size: 26px; line-height: 1; cursor: pointer;
            z-index: 9998;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s ease, background 0.15s ease;
        }
        .chatbot-toggle:hover { background: #364fc7; transform: scale(1.06); }
        .chatbot-panel {
            position: fixed; bottom: 96px; right: 24px;
            width: 360px; max-width: calc(100vw - 48px);
            height: 480px; max-height: calc(100vh - 140px);
            background: #fff;
            border: 1px solid #dee2e6; border-radius: 12px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.22);
            display: flex; flex-direction: column;
            z-index: 9999; overflow: hidden;
        }
        .chatbot-panel[hidden] { display: none !important; }
        .chatbot-header {
            padding: 12px 16px; flex-shrink: 0;
            border-bottom: 1px solid #dee2e6; background: #f8f9fa;
            display: flex; justify-content: space-between; align-items: center;
        }
        .chatbot-header strong { font-size: 15px; color: #212529; }
        .chatbot-messages {
            flex: 1; overflow-y: auto; padding: 14px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .chatbot-msg {
            padding: 8px 12px; border-radius: 14px; max-width: 85%;
            white-space: pre-wrap; word-wrap: break-word;
            line-height: 1.45; font-size: 14px;
        }
        .chatbot-msg-user { align-self: flex-end; background: #4263eb; color: #fff; border-bottom-right-radius: 4px; }
        .chatbot-msg-bot  { align-self: flex-start; background: #f1f3f5; color: #212529; border-bottom-left-radius: 4px; }
        .chatbot-suggestions {
            padding: 0 12px 8px; flex-shrink: 0;
            display: flex; flex-wrap: wrap; gap: 6px;
        }
        .chatbot-suggestion {
            background: #fff; color: #4263eb;
            border: 1px solid #4263eb; border-radius: 16px;
            padding: 4px 12px; font-size: 12px; cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .chatbot-suggestion:hover { background: #4263eb; color: #fff; }
        .chatbot-form {
            display: flex; gap: 8px; padding: 12px;
            border-top: 1px solid #dee2e6; flex-shrink: 0; background: #fff;
        }
        .chatbot-form input {
            flex: 1; padding: 8px 12px;
            border: 1px solid #ced4da; border-radius: 6px;
            font-size: 14px; outline: none;
        }
        .chatbot-form input:focus { border-color: #4263eb; box-shadow: 0 0 0 3px rgba(66,99,235,0.15); }
        .chatbot-form button {
            background: #4263eb; color: #fff; border: none;
            padding: 8px 16px; border-radius: 6px;
            font-size: 14px; cursor: pointer;
        }
        .chatbot-form button:hover { background: #364fc7; }
    </style>
</head>
<body>

<!-- ==================== NAVBAR ==================== -->
<nav class="navbar">
    <div class="container navbar-inner">
        <a class="navbar-brand" th:href="@{/}">
            <span class="brand-mark">SV</span>
            <span>Secure Voting</span>
        </a>

        <ul class="navbar-nav" sec:authorize="isAuthenticated()">
            <li><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
            <li><a class="nav-link" th:href="@{/elections/new}">New election</a></li>
            <li><a class="nav-link" th:href="@{/chain}">Chain</a></li>
            <li><a class="nav-link" th:href="@{/verify}">Verify</a></li>
        </ul>

        <div class="row items-center gap-3">
            <div sec:authorize="isAuthenticated()" class="row items-center gap-3">
                <span class="user-pill" th:title="${currentUserEmail} ?: ''">
                    <span class="avatar" th:text="${currentUserInitial} ?: 'U'">U</span>
                    <span th:text="${currentUserName} ?: 'Signed in'" class="text-sm">user</span>
                </span>
                <form th:action="@{/logout}" method="post" style="margin:0;">
                    <button type="submit" class="btn btn-ghost btn-sm">Sign out</button>
                </form>
            </div>
            <div sec:authorize="!isAuthenticated()" class="row gap-2">
                <a class="btn btn-ghost btn-sm" th:href="@{/login}">Sign in</a>
                <a class="btn btn-primary btn-sm" th:href="@{/register}">Create account</a>
            </div>
        </div>
    </div>
</nav>

<!-- ==================== FLASH MESSAGES ==================== -->
<div class="container mt-4">
    <div th:if="${info}" class="alert alert-info">
        <strong>Info.</strong> <span th:text="${info}">info</span>
    </div>
    <div th:if="${globalError}" class="alert alert-danger">
        <strong>Error.</strong> <span th:text="${globalError}">error</span>
    </div>
    <div th:if="${error}" class="alert alert-danger">
        <strong>Error.</strong> <span th:text="${error}">error</span>
    </div>
</div>

<!-- ==================== MAIN ==================== -->
<main class="app-main">
    <div th:replace="${content}">Page content</div>
</main>

<!-- ==================== CHATBOT (visible to everyone) ==================== -->
<button id="chatbot-toggle" type="button" class="chatbot-toggle" aria-label="Open help chat">
    <span aria-hidden="true">💬</span>
</button>
<aside id="chatbot-panel" class="chatbot-panel" hidden>
    <header class="chatbot-header">
        <strong>Voting Assistant</strong>
        <button id="chatbot-close" type="button" class="btn btn-ghost btn-sm" aria-label="Close">✕</button>
    </header>
    <div id="chatbot-messages" class="chatbot-messages" aria-live="polite"></div>
    <div id="chatbot-suggestions" class="chatbot-suggestions"></div>
    <form id="chatbot-form" class="chatbot-form" autocomplete="off">
        <input id="chatbot-input" type="text" class="form-control"
               placeholder="Ask about voting, OTPs, receipts…" required>
        <button type="submit" class="btn btn-primary btn-sm">Send</button>
    </form>
</aside>

<!-- Inline chatbot logic — runs immediately, no external file needed -->
<script th:inline="none">
    (function () {
        'use strict';
        console.log('[chatbot] inline script running');

        function init() {
            var toggle      = document.getElementById('chatbot-toggle');
            var panel       = document.getElementById('chatbot-panel');
            var closeBtn    = document.getElementById('chatbot-close');
            var form        = document.getElementById('chatbot-form');
            var input       = document.getElementById('chatbot-input');
            var messages    = document.getElementById('chatbot-messages');
            var suggestions = document.getElementById('chatbot-suggestions');

            if (!toggle || !panel || !form) {
                console.warn('[chatbot] elements missing', {
                    toggle: !!toggle, panel: !!panel, form: !!form
                });
                return;
            }
            console.log('[chatbot] wired up');

            var csrfMeta    = document.querySelector('meta[name="_csrf"]');
            var csrfHdrMeta = document.querySelector('meta[name="_csrf_header"]');
            var csrfToken   = csrfMeta ? csrfMeta.getAttribute('content') : null;
            var csrfHeader  = csrfHdrMeta ? csrfHdrMeta.getAttribute('content') : null;

            var greeted = false;

            function openPanel() {
                panel.hidden = false;
                if (input) input.focus();
                if (!greeted) {
                    greeted = true;
                    bubble('bot', "Hi! I can help with voting, OTP codes, receipts, and blockchain verification. What's on your mind?");
                    renderSuggestions(['How do I vote?', "OTP didn't arrive", 'How does the blockchain work?']);
                }
            }
            function closePanel() { panel.hidden = true; }

            toggle.addEventListener('click', function () {
                console.log('[chatbot] toggle clicked, hidden=', panel.hidden);
                if (panel.hidden) openPanel(); else closePanel();
            });
            if (closeBtn) closeBtn.addEventListener('click', closePanel);

            function bubble(role, text) {
                var div = document.createElement('div');
                div.className = 'chatbot-msg chatbot-msg-' + role;
                div.textContent = text;
                messages.appendChild(div);
                messages.scrollTop = messages.scrollHeight;
            }

            function renderSuggestions(list) {
                suggestions.innerHTML = '';
                if (!list || !list.length) return;
                list.forEach(function (s) {
                    var b = document.createElement('button');
                    b.type = 'button';
                    b.className = 'chatbot-suggestion';
                    b.textContent = s;
                    b.addEventListener('click', function () {
                        input.value = s;
                        form.requestSubmit();
                    });
                    suggestions.appendChild(b);
                });
            }

            function ask(message) {
                bubble('user', message);
                renderSuggestions([]);
                var headers = { 'Content-Type': 'application/json', 'Accept': 'application/json' };
                if (csrfHeader && csrfToken) headers[csrfHeader] = csrfToken;
                console.log('[chatbot] POST /chatbot/ask', message);
                fetch('/chatbot/ask', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ message: message })
                }).then(function (res) {
                    console.log('[chatbot] response status', res.status);
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                }).then(function (data) {
                    bubble('bot', data.answer || 'Sorry, I have no answer for that.');
                    renderSuggestions(data.suggestions || []);
                }).catch(function (err) {
                    console.error('[chatbot] request failed:', err);
                    bubble('bot', 'Sorry — I could not reach the assistant. Please try again.');
                });
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var msg = input.value.trim();
                if (!msg) return;
                input.value = '';
                ask(msg);
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>

<!-- ==================== FOOTER ==================== -->
<footer class="footer">
    <div class="container footer-inner">
        <span>© 2026 Secure Voting System</span>
        <span class="text-mono text-xs">AES-256 · RSA-2048 · SHA-256 PoW</span>
    </div>
</footer>

<th:block th:replace="${scripts} ?: ~{}"></th:block>
</body>
</html>
