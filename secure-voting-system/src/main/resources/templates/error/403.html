<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<th:block th:replace="~{fragments/layout :: page('Access denied', ~{::section}, ~{})}">

    <section class="auth-shell">
        <div class="auth-card text-center">
            <div class="error-code">403</div>
            <h1 class="mb-2">Access denied</h1>
            <p class="text-tertiary mb-6">You don't have permission to view this page.</p>
            <a class="btn btn-primary" th:href="@{/dashboard}">Back to dashboard</a>
        </div>
    </section>

</th:block>
</body>
</html>
