<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<th:block th:replace="~{fragments/layout :: page('Not found', ~{::section}, ~{})}">

    <section class="auth-shell">
        <div class="auth-card text-center">
            <div class="error-code">404</div>
            <h1 class="mb-2">Page not found</h1>
            <p class="text-tertiary mb-6">The page you're looking for doesn't exist.</p>
            <a class="btn btn-primary" th:href="@{/}">Go home</a>
        </div>
    </section>

</th:block>
</body>
</html>
