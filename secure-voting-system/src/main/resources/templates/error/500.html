<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<th:block th:replace="~{fragments/layout :: page('Server error', ~{::section}, ~{})}">

    <section class="auth-shell">
        <div class="auth-card text-center">
            <div class="error-code">500</div>
            <h1 class="mb-2">Something went wrong</h1>
            <p class="text-tertiary mb-6">An unexpected error occurred. Please try again.</p>
            <a class="btn btn-primary" th:href="@{/}">Go home</a>
        </div>
    </section>

</th:block>
</body>
</html>
