<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<th:block th:replace="~{fragments/layout :: page('Sign in', ~{::section}, ~{})}">

    <section class="auth-shell">
        <div class="auth-card">
            <h1 class="text-center mb-2">Welcome back</h1>
            <p class="text-center text-tertiary mb-6">Sign in to manage your elections or cast a vote.</p>

            <div th:if="${param.error}" class="alert alert-danger mb-4">
                Invalid email or password. If you've failed several attempts your account may be temporarily locked.
            </div>
            <div th:if="${param.logout}" class="alert alert-info mb-4">
                You've been signed out.
            </div>
            <div th:if="${param.verified}" class="alert alert-success mb-4">
                Email verified. You can now sign in.
            </div>

            <form th:action="@{/login}" method="post" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">Email <span class="required">*</span></label>
                    <input id="email" name="email" type="email" class="form-control"
                           autocomplete="email" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password <span class="required">*</span></label>
                    <input id="password" name="password" type="password" class="form-control"
                           autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg">Sign in</button>
            </form>

            <p class="text-center text-tertiary mt-6 mb-0">
                New here? <a th:href="@{/register}">Create one</a>.
            </p>
        </div>
    </section>

</th:block>
</body>
</html>
