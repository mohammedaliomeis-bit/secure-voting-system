<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<th:block th:replace="~{fragments/layout :: page('Election', ~{::section}, ~{})}">
    <section>
        <div class="container-narrow" th:with="zone=${T(java.time.ZoneId).systemDefault()},
                                                now=${T(java.time.Instant).now()},
                                                status=${election.status.name()}">

            <p class="text-mono text-xs text-muted mb-1" th:text="${election.electionCode}">ELX-XXXXX</p>
            <h1 th:text="${election.title}">Title</h1>

            <div class="row gap-3 items-center mb-6">
                <span class="badge"
                      th:classappend="${status == 'ACTIVE'    ? 'badge-success' :
                                        status == 'CLOSED'   ? 'badge-muted'   :
                                        status == 'SCHEDULED'? 'badge-warning' : 'badge-info'}"
                      th:text="${election.status}">DRAFT</span>
                <span class="text-sm text-tertiary">
                    <span th:text="${#temporals.format(election.startTime.atZone(zone), 'dd MMM HH:mm')}"></span>
                    →
                    <span th:text="${#temporals.format(election.endTime.atZone(zone), 'dd MMM HH:mm')}"></span>
                </span>
            </div>

            <!-- Scheduled countdown banner -->
            <div th:if="${status == 'SCHEDULED'}"
                 class="callout callout-info mb-6"
                 style="padding: 12px 16px; border-radius: 8px; background: #e7f5ff; border: 1px solid #a5d8ff;">
                <strong>Scheduled.</strong>
                Goes live automatically at
                <span th:text="${#temporals.format(election.startTime.atZone(zone), 'dd MMM yyyy, HH:mm')}"></span>.
            </div>

            <p th:if="${election.description}" th:text="${election.description}" class="text-lg mb-6"></p>

            <div class="row gap-3 mb-7">
                <a th:if="${status == 'ACTIVE'}"
                   class="btn btn-primary"
                   th:href="@{/vote/{code}/identify(code=${election.electionCode})}">Vote now</a>

                <a th:if="${isOrganizer and (status == 'DRAFT' or status == 'SCHEDULED')}"
                   class="btn btn-secondary"
                   th:href="@{/elections/{code}/edit(code=${election.electionCode})}">Manage</a>

                <!-- Schedule (organizer, only from DRAFT) -->
                <form th:if="${isOrganizer and status == 'DRAFT'}"
                      th:action="@{/elections/{code}/schedule(code=${election.electionCode})}"
                      method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-primary">Schedule election</button>
                </form>

                <!-- Revert to draft (organizer, only while SCHEDULED and startTime is still in the future) -->
                <form th:if="${isOrganizer and status == 'SCHEDULED' and election.startTime.isAfter(now)}"
                      th:action="@{/elections/{code}/unschedule(code=${election.electionCode})}"
                      method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-secondary">Revert to draft</button>
                </form>

                <a th:if="${(isOrganizer and status != 'DRAFT') or status == 'CLOSED'}"
                   class="btn btn-secondary"
                   th:href="@{/elections/{code}/results(code=${election.electionCode})}">View results</a>
            </div>

            <h2 class="mb-4">Candidates</h2>
            <div class="grid grid-auto">
                <article th:each="c : ${election.candidates}" class="card candidate-card text-center">
                    <img th:if="${c.photoPath != null}"
                         th:src="@{/uploads/candidates/{n}(n=${c.photoPath})}"
                         th:alt="${c.name}"
                         style="width: 96px; height: 96px; object-fit: cover; object-position: center; border-radius: 50%; border: 1px solid var(--border, #dee2e6); display: block; margin: 0 auto 12px;">
                    <div th:if="${c.photoPath == null}"
                         aria-hidden="true"
                         style="width: 96px; height: 96px; border-radius: 50%; border: 1px solid var(--border, #dee2e6); background: #f1f3f5; color: #6c757d; font-size: 2rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-weight: 600;">
                        <span th:text="${#strings.toUpperCase(#strings.substring(c.name,0,1))}">·</span>
                    </div>
                    <h3 class="mb-1" th:text="${c.name}">Candidate</h3>
                    <p class="text-sm text-tertiary mb-2" th:text="${c.party} ?: ''"></p>
                    <p class="text-sm" th:text="${c.description} ?: ''"></p>
                </article>
            </div>

            <!-- Surface validation errors from /schedule attempt -->
            <div th:if="${globalError}"
                 class="callout callout-warning mt-6"
                 style="padding: 12px 16px; border-radius: 8px; background: #fff5f5; border: 1px solid #ffa8a8; color: #c92a2a;">
                <span th:text="${globalError}"></span>
            </div>
        </div>
    </section>
</th:block>
</body>
</html>
