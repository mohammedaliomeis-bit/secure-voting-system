<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<th:block th:replace="~{fragments/layout :: page('New election', ~{::section}, ~{})}">

    <section>
        <div class="container-narrow">
            <a class="btn btn-ghost btn-sm mb-4" th:href="@{/dashboard}">← Back to dashboard</a>
            <h1>New election</h1>
            <p class="text-tertiary mb-6">Start with the basics. You'll add candidates and the voter roll in the next step.</p>

            <form th:action="@{/elections/new}" th:object="${form}" method="post" class="card card-elevated" novalidate>

                <div class="form-group">
                    <label class="form-label" for="title">Title <span class="required">*</span></label>
                    <input id="title" type="text" class="form-control"
                           th:field="*{title}" maxlength="150" minlength="3" required>
                    <span class="form-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="description">Description</label>
                    <textarea id="description" class="form-textarea"
                              th:field="*{description}" maxlength="2000" rows="3"></textarea>
                    <span class="form-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
                </div>

                <div class="grid grid-2 gap-4">
                    <div class="form-group">
                        <label class="form-label" for="startTime">Voting opens <span class="required">*</span></label>
                        <input id="startTime" type="datetime-local" class="form-control"
                               th:field="*{startTime}" required>
                        <span class="form-error" th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="endTime">Voting closes <span class="required">*</span></label>
                        <input id="endTime" type="datetime-local" class="form-control"
                               th:field="*{endTime}" required>
                        <span class="form-error" th:if="${#fields.hasErrors('endTime')}" th:errors="*{endTime}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="maxVotesPerVoter">Votes per voter</label>
                    <input id="maxVotesPerVoter" type="number" class="form-control"
                           th:field="*{maxVotesPerVoter}" min="1" max="20">
                    <small class="form-help">Usually 1 (single-choice ballot).</small>
                    <span class="form-error" th:if="${#fields.hasErrors('maxVotesPerVoter')}" th:errors="*{maxVotesPerVoter}"></span>
                </div>

                <div class="row gap-3 mt-4">
                    <button type="submit" class="btn btn-primary">Create election</button>
                    <a class="btn btn-ghost" th:href="@{/dashboard}">Cancel</a>
                </div>
            </form>
        </div>
    </section>

</th:block>
</body>
</html>
