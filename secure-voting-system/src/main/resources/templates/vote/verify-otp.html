<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<th:block th:replace="~{fragments/layout :: page('Verify code', ~{::section}, ~{})}">

    <section class="auth-shell">
        <div class="auth-card">
            <p class="text-mono text-xs text-muted text-center mb-1" th:text="${election.electionCode}">ELX-XXXXX</p>
            <h1 class="text-center mb-2">Confirm it's you</h1>
            <p class="text-center text-tertiary mb-6">
                We emailed a 6-digit code. Enter it below to unlock your ballot.
                It expires in 10 minutes.
            </p>

            <form th:action="@{/vote/{code}/verify-otp(code=${election.electionCode})}" method="post" novalidate>
                <div class="form-group">
                    <label class="form-label" for="otp">Voting code <span class="required">*</span></label>
                    <input id="otp" name="otp" type="text" class="form-control text-center text-mono text-xl"
                           inputmode="numeric" pattern="\d{6}" maxlength="6"
                           autocomplete="one-time-code" required autofocus
                           style="letter-spacing: 0.5em;">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg">Verify</button>
            </form>

            <form th:action="@{/vote/{code}/resend-otp(code=${election.electionCode})}" method="post" class="mt-4">
                <button type="submit" class="btn btn-ghost btn-block">Resend code</button>
            </form>
        </div>
    </section>

</th:block>
</body>
</html>
