spring:
  application:
    name: secure-voting-system

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/secure_voting?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: true
    properties:
      hibernate:
        format_sql: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp

  thymeleaf:
    cache: false

server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: lax
        secure: false
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
    whitelabel:
      enabled: false

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

  crypto:
    aes-key-base64: ${AES_KEY_BASE64}

  otp:
    length: 6
    ttl-minutes: 10
    max-attempts: 5

  security:
    brute-force:
      max-failed-attempts: 5
      lock-minutes: 15

  blockchain:
    ledger-path: "./blockchain-data/ledger.chain"
    difficulty: 4

  rsa:
    keystore-path: "./blockchain-data/rsa-keys"
    key-size: 2048

  uploads:
    root: "./uploads"
    csv-subdir: "csv"
    candidate-photo-subdir: "candidates"

  mail:
    from: ${MAIL_FROM}

logging:
  level:
    root: INFO
    com.securevoting: INFO
    org.springframework.security: INFO